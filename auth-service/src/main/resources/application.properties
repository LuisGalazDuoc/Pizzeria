spring.application.name=auth
server.port=9099
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/bd_users?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
jwt.secret=esta_es_mi_compleja_clave_secreta

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.path=/auth/v3/api-docs
springdoc.api-docs.path=/auth/v3/api-docs
# Permite que el microservicio reconozca que opera detrás de un proxy (Gateway)
server.forward-headers-strategy=framework

springdoc.api-docs.cors.allowed-origins=http://api-gateway:9090