spring.application.name=pedido-detalle-service
server.port=9096

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/bd_pedido-detalle?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none

api.base-url=http://api-gateway:9090
pedido.service.url=http://pedido-service:9095
producto.service.url=http://producto-service:9094

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.path=/pedido-detalles/swagger-ui.html



# Permite que el microservicio reconozca que opera detrás de un proxy (Gateway)
server.forward-headers-strategy=framework

spring.security.oauth2.resourceserver.jwt.secret-key=esta_es_mi_compleja_clave_secreta