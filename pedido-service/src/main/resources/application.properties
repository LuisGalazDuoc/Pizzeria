spring.application.name=pedido-service
server.port=9095

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/bd_pedido?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none

api.base-url=http://api-gateway:9090
usuario.service.url=http://usuario-service:9091
direccion.service.url=http://direccion-service:9092




springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.path=/pedidos/swagger-ui.html

logging.level.root=INFO
logging.level.com.pizzeria.pedido_service=DEBUG
logging.file.name=logs/pedido-service.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

spring.security.oauth2.resourceserver.jwt.secret-key=esta_es_mi_compleja_clave_secreta