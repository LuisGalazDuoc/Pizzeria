spring.application.name=producto-service
server.port=9094

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/bd_producto?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.path=/productos/swagger-ui.html

# Permite que el microservicio reconozca que opera detrás de un proxy (Gateway)
server.forward-headers-strategy=framework


api.base-url=http://api-gateway:9090
categoria.service.url=http://categoria-service:9093

spring.security.oauth2.resourceserver.jwt.secret-key=esta_es_mi_compleja_clave_secreta