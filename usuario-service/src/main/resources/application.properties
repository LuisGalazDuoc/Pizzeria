spring.application.name=usuario-service
server.port=9091

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/bd_usuario?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none

api.base-url=http://localhost:9090

logging.level.root=INFO
logging.level.com.example.usuario_service=DEBUG
logging.file.name=logs/usuario-service.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


spring.security.oauth2.resourceserver.jwt.secret-key=esta_es_mi_compleja_clave_secreta
