spring.application.name=usuario-service
server.port=9091

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/bd_usuario?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none

api.base-url=http://api-gateway:9090

logging.level.root=INFO
logging.level.com.example.usuario_service=DEBUG
logging.file.name=logs/usuario-service.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

springdoc.api-docs.enabled=true
# Desactive la interfaz web local de Swagger en este microservicio 
# ya que la peticion sera centralizada desde el puerto 9090 del Gateway)
springdoc.swagger-ui.enabled=false
# Obliga a Springdoc a exponer el JSON en la ruta que espera el Gateway
springdoc.swagger-ui.path=/usuarios/v3/api-docs

# Permite que el microservicio reconozca que opera detrás de un proxy (Gateway)
server.forward-headers-strategy=framework
spring.security.oauth2.resourceserver.jwt.secret-key=esta_es_mi_compleja_clave_secreta
